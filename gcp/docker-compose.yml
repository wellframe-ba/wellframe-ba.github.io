# Local development Docker Compose
# Mirrors the Cloud Run production environment
version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: gcp/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LITESTREAM_BUCKET=file:///data/data.db
    volumes:
      - pocketbase-data:/pb/pb_data
      # Mount local HTML files for development
      - ..:/usr/share/nginx/html:ro

volumes:
  pocketbase-data: